<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex</title>
    <meta name="description" content="Apex Landing Page">
    <style>
        :root {
            --bg-color: #000000;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .logo {
            max-width: 80%;
            max-height: 80vh;
            width: auto;
            height: auto;
            object-fit: contain;
            /* Subtle pulse effect for a premium feel */
            animation: pulse 4s ease-in-out infinite alternate;
            animation-delay: 1.2s;
            filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.05));
            user-select: none;
            -webkit-user-drag: none;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1) translateY(0);
            }
            100% {
                transform: scale(1.02) translateY(-4px);
            }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="materials/apex_logo.png" alt="Apex Logo" class="logo">
    </div>
</body>
</html>
