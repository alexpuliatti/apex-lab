<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex Lab — Zine Graph</title>
  <meta name="description" content="Explore the Apex Lab ecosystem through the interactive term graph.">
  <link rel="icon" href="/icon.png" type="image/png">
  <link rel="stylesheet" href="/styles/main.css?v=2">
  
  <!-- ES Module resolution handled via esm.sh in scripts/graph.js -->
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Prevent scrolling on the graph page */
      background-color: var(--bg-cream, #EBE6DF);
    }
    #graph-container {
      width: 100vw;
      height: 100vh;
      cursor: grab;
    }
    #graph-container:active {
      cursor: grabbing;
    }
    
    /* Small info panel on graph page */
    .graph-info {
      position: absolute;
      bottom: 2rem;
      left: 2rem;
      pointer-events: none;
      font-family: 'Geist', sans-serif;
      color: var(--accent-red, #B22222);
      max-width: 300px;
      z-index: 10;
    }
    .graph-info h1 {
      font-family: 'ArrowFont', serif;
      font-size: 2rem;
      margin: 0 0 0.5rem 0;
      line-height: 1;
    }
    .graph-info p {
      font-size: 0.85rem;
      margin: 0;
      opacity: 0.8;
    }
    
    /* Make nav absolute over canvas */
    .nav {
      position: fixed;
    }
  </style>
</head>
<body>

  <!-- ========== NAVIGATION ========== -->
  <nav class="nav" id="main-nav">
    <a href="/" class="nav-pill nav-pill--brand" id="nav-home">
      <span class="nav-pill__text">Apex Lab</span>
    </a>
    <div class="nav-group nav-group--center">
      <a href="/#statement" class="nav-pill" id="nav-culture">
        <span class="nav-pill__text">Culture</span>
      </a>
      <a href="/zine.html" class="nav-pill nav-pill--active" id="nav-zine">
        <span class="nav-pill__text">Zine</span>
      </a>
      <a href="/#grid" class="nav-pill" id="nav-archive">
        <span class="nav-pill__text">Archive</span>
      </a>
    </div>
    <a href="/about.html" class="nav-pill" id="about-open">
      <span class="nav-pill__text">About</span>
    </a>
  </nav>

  <!-- ========== GRAPH INFO ========== -->
  <div class="graph-info">
    <h1>Ecosystem Graph</h1>
    <p>Interact to explore the interconnected concepts, eras, and voices behind the Zine.</p>
  </div>

  <!-- ========== GRAPH CONTAINER ========== -->
  <div id="graph-container"></div>

  <!-- ========== NODE POPUP OVERLAY ========== -->
  <div id="node-popup" class="node-popup" style="display: none;">
    <div class="node-popup__overlay" id="popup-overlay-bg"></div>
    <div class="node-popup__content">
      <button class="node-popup__close" id="popup-close">✕</button>
      <div class="node-popup__badges">
        <span class="node-popup__badge" id="popup-type"></span>
        <span class="node-popup__macro" id="popup-macro" style="display: none;"></span>
      </div>
      <h2 class="node-popup__title" id="popup-title"></h2>
      <p class="node-popup__source" id="popup-source"></p>
      <div class="node-popup__divider"></div>
      <p class="node-popup__desc" id="popup-desc"></p>
    </div>
  </div>

  <!-- ========== APP SCRIPTS ========== -->
  <script type="module" src="/scripts/graph.js?v=17"></script>

</body>
</html>
